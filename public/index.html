<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Char Chitti Pro 🃏</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
/* ─── CSS Variables ──────────────────────────────────────────────────── */
:root {
  --bg:        #0f0f1a;
  --bg2:       #141426;
  --bg3:       #1c1c35;
  --gold:      #f1c40f;
  --gold2:     #e6a817;
  --red:       #e74c3c;
  --red2:      #c0392b;
  --cyan:      #00d4ff;
  --purple:    #9b59b6;
  --border:    rgba(255,255,255,0.08);
  --glass:     rgba(255,255,255,0.04);
  --shadow:    0 8px 40px rgba(0,0,0,0.6);
  --card-w:    72px;
  --card-h:    100px;
  --radius:    12px;
  --font-head: 'Cinzel Decorative', serif;
  --font-body: 'Rajdhani', sans-serif;
  --font-mono: 'Space Mono', monospace;
}

/* ─── Reset & Base ───────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: var(--bg);
  color: #e8e8f0;
  font-family: var(--font-body);
  font-size: 16px;
  user-select: none;
  position: relative;
}

/* Animated background grid */
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image:
    linear-gradient(rgba(241,196,15,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(241,196,15,0.03) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}
body::after {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(155,89,182,0.15), transparent),
              radial-gradient(ellipse 60% 40% at 100% 100%, rgba(0,212,255,0.08), transparent);
  pointer-events: none;
  z-index: 0;
}

/* ─── Overlay base ───────────────────────────────────────────────────── */
.overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  background: rgba(15,15,26,0.88);
  transition: opacity 0.4s ease;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

/* ─── Lobby ──────────────────────────────────────────────────────────── */
#lobby-screen {
  flex-direction: column;
  gap: 0;
}
.lobby-box {
  background: var(--bg2);
  border: 1px solid rgba(241,196,15,0.2);
  border-radius: 24px;
  padding: 48px 52px 44px;
  width: min(460px, 94vw);
  display: flex; flex-direction: column; align-items: center; gap: 28px;
  box-shadow: 0 0 80px rgba(241,196,15,0.08), var(--shadow);
  position: relative;
  overflow: hidden;
}
.lobby-box::before {
  content: '';
  position: absolute;
  top: -60px; left: 50%;
  transform: translateX(-50%);
  width: 200px; height: 120px;
  background: radial-gradient(ellipse, rgba(241,196,15,0.15), transparent 70%);
  pointer-events: none;
}
.lobby-title {
  font-family: var(--font-head);
  font-size: clamp(18px, 4vw, 24px);
  color: var(--gold);
  text-align: center;
  letter-spacing: 2px;
  text-shadow: 0 0 30px rgba(241,196,15,0.4);
  line-height: 1.3;
}
.lobby-title span {
  display: block;
  font-size: 0.5em;
  color: rgba(255,255,255,0.4);
  font-family: var(--font-mono);
  letter-spacing: 4px;
  margin-top: 4px;
}
.lobby-form {
  width: 100%;
  display: flex; flex-direction: column; gap: 14px;
}
.lobby-form label {
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.4);
  font-family: var(--font-mono);
  margin-bottom: 4px;
  display: block;
}
.lobby-form input[type="text"] {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  padding: 12px 16px;
  color: #fff;
  font-family: var(--font-body);
  font-size: 16px;
  font-weight: 600;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.lobby-form input[type="text"]:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px rgba(241,196,15,0.12);
}

/* Color picker */
.color-row {
  display: flex; gap: 10px; flex-wrap: wrap;
}
.color-dot {
  width: 30px; height: 30px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.18s cubic-bezier(0.175,0.885,0.32,1.275), border-color 0.18s;
}
.color-dot.selected {
  border-color: #fff;
  transform: scale(1.22);
  box-shadow: 0 0 12px currentColor;
}

.lobby-btn {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0f0f1a;
  font-family: var(--font-head);
  font-size: 14px;
  font-weight: 900;
  letter-spacing: 2px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.18s cubic-bezier(0.175,0.885,0.32,1.275), box-shadow 0.18s;
  box-shadow: 0 4px 24px rgba(241,196,15,0.3);
  margin-top: 4px;
}
.lobby-btn:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 8px 32px rgba(241,196,15,0.45); }
.lobby-btn:active { transform: scale(0.98); }
.lobby-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

.lobby-players-waiting {
  width: 100%;
  background: var(--glass);
  border-radius: 12px;
  padding: 14px 16px;
  border: 1px solid var(--border);
}
.lobby-players-waiting h4 {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.35);
  font-family: var(--font-mono);
  margin-bottom: 10px;
}
.waiting-list {
  display: flex; flex-direction: column; gap: 6px;
  min-height: 80px;
}
.waiting-player {
  display: flex; align-items: center; gap: 10px;
  font-size: 14px; font-weight: 600;
  animation: slideIn 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
}
.waiting-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}
.lobby-count {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(255,255,255,0.4);
  text-align: center;
}
.lobby-count span { color: var(--gold); font-weight: 700; }
.lobby-error {
  color: var(--red);
  font-size: 13px;
  text-align: center;
  font-family: var(--font-mono);
  min-height: 16px;
}

/* ─── Game Screen ────────────────────────────────────────────────────── */
#game-screen {
  position: fixed; inset: 0;
  display: none;
  z-index: 10;
}
#game-screen.active { display: block; }

/* Table */
.game-table {
  position: relative;
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
}

/* Center info */
.center-hub {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  z-index: 5;
  pointer-events: none;
}
.center-logo {
  font-family: var(--font-head);
  font-size: clamp(12px, 2.5vw, 18px);
  color: rgba(241,196,15,0.25);
  letter-spacing: 3px;
  text-align: center;
}
.turn-indicator {
  font-family: var(--font-mono);
  font-size: clamp(10px, 1.8vw, 13px);
  color: rgba(255,255,255,0.25);
  text-align: center;
  letter-spacing: 2px;
}
#turn-name {
  color: var(--gold);
  font-weight: 700;
}

/* ─── Player Slots ───────────────────────────────────────────────────── */
.player-slot {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

/* Bottom = YOU */
.player-slot[data-pos="bottom"] {
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  flex-direction: column-reverse;
}

/* Top opponent */
.player-slot[data-pos="top"] {
  top: 20px; left: 50%;
  transform: translateX(-50%);
}

/* Left opponent */
.player-slot[data-pos="left"] {
  left: 20px; top: 50%;
  transform: translateY(-50%);
  flex-direction: row;
}
.player-slot[data-pos="left"] .hand-area {
  flex-direction: column;
}

/* Right opponent */
.player-slot[data-pos="right"] {
  right: 20px; top: 50%;
  transform: translateY(-50%);
  flex-direction: row-reverse;
}
.player-slot[data-pos="right"] .hand-area {
  flex-direction: column;
}

/* Name tag */
.name-tag {
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: clamp(11px, 1.8vw, 14px);
  font-weight: 700;
  font-family: var(--font-body);
  letter-spacing: 1px;
  white-space: nowrap;
  transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  position: relative;
}
.name-tag .pip { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }

.name-tag.active-turn {
  border-color: var(--gold) !important;
  box-shadow: 0 0 18px rgba(241,196,15,0.5), 0 0 40px rgba(241,196,15,0.2);
  transform: scale(1.08);
  color: var(--gold);
}
.name-tag .hand-count {
  font-family: var(--font-mono);
  font-size: 10px;
  color: rgba(255,255,255,0.4);
  margin-left: 4px;
}

/* ─── Hand Area ──────────────────────────────────────────────────────── */
.hand-area {
  display: flex;
  gap: 8px;
  flex-wrap: nowrap;
  min-width: calc(var(--card-w) * 4 + 8px * 3);
  min-height: var(--card-h);
  align-items: center;
  justify-content: center;
  position: relative;
}

/* ─── Cards ──────────────────────────────────────────────────────────── */
.card {
  width: var(--card-w);
  height: var(--card-h);
  border-radius: var(--radius);
  display: flex; align-items: center; justify-content: center;
  font-family: var(--font-head);
  font-size: 28px;
  font-weight: 700;
  cursor: default;
  flex-shrink: 0;
  position: relative;
  transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
              box-shadow 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  animation: cardDeal 0.45s cubic-bezier(0.175,0.885,0.32,1.275) both;
  border: 1px solid rgba(255,255,255,0.12);
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  border-radius: var(--radius);
  background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.01));
  pointer-events: none;
}
.card.face-down {
  background: linear-gradient(135deg, #1c1c35 0%, #2a2a4a 50%, #1c1c35 100%);
  font-size: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.4);
}
.card.face-down::after {
  content: '🃏';
  font-size: 28px;
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%);
  filter: opacity(0.4);
}

/* Card suit styles */
.card[data-suit="A"] { background: linear-gradient(135deg, #1a3a5c, #2980b9); color: #74c9ff; box-shadow: 0 4px 20px rgba(41,128,185,0.35); }
.card[data-suit="B"] { background: linear-gradient(135deg, #3a1a3a, #8e44ad); color: #c97fff; box-shadow: 0 4px 20px rgba(142,68,173,0.35); }
.card[data-suit="C"] { background: linear-gradient(135deg, #1a3a1a, #27ae60); color: #74ff9b; box-shadow: 0 4px 20px rgba(39,174,96,0.35); }
.card[data-suit="D"] { background: linear-gradient(135deg, #3a2a1a, #e67e22); color: #ffc97a; box-shadow: 0 4px 20px rgba(230,126,34,0.35); }

/* Selectable (my cards when it's my turn) */
.card.selectable {
  cursor: pointer;
}
.card.selectable:hover {
  transform: translateY(-14px) scale(1.07);
  box-shadow: 0 16px 40px rgba(241,196,15,0.3), 0 0 0 2px var(--gold);
  z-index: 10;
}
.card.selectable:active {
  transform: translateY(-6px) scale(0.97);
}
.card.selected-card {
  transform: translateY(-18px) scale(1.1);
  box-shadow: 0 20px 50px rgba(241,196,15,0.5), 0 0 0 2px var(--gold);
  z-index: 20;
}

@keyframes cardDeal {
  0%   { transform: scale(0.3) rotate(-20deg); opacity: 0; }
  100% { transform: scale(1) rotate(0deg); opacity: 1; }
}
@keyframes cardFly {
  0%   { transform: scale(1); opacity: 1; }
  100% { transform: scale(0.1) translateY(-60px); opacity: 0; }
}
.card.flying { animation: cardFly 0.35s ease-in forwards; }

/* ─── Pass Button ────────────────────────────────────────────────────── */
.pass-btn {
  position: fixed;
  bottom: 160px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  color: #0f0f1a;
  font-family: var(--font-head);
  font-size: 13px;
  letter-spacing: 2px;
  padding: 12px 32px;
  border: none;
  border-radius: 30px;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.2s, box-shadow 0.2s;
  box-shadow: 0 4px 24px rgba(241,196,15,0.4);
  z-index: 50;
  display: none;
}
.pass-btn.visible { display: block; }
.pass-btn:hover { transform: translateX(-50%) translateY(-3px) scale(1.04); box-shadow: 0 10px 36px rgba(241,196,15,0.55); }
.pass-btn:active { transform: translateX(-50%) scale(0.96); }
.pass-btn:disabled { opacity: 0.35; pointer-events: none; }

/* ─── Reaction TOUCH Button ──────────────────────────────────────────── */
#touch-btn {
  position: fixed;
  bottom: 140px;
  left: 50%;
  transform: translateX(-50%);
  width: 160px; height: 160px;
  border-radius: 50%;
  background: radial-gradient(circle, #e74c3c, #c0392b);
  border: 4px solid rgba(255,255,255,0.2);
  color: #fff;
  font-family: var(--font-head);
  font-size: 14px;
  letter-spacing: 2px;
  cursor: pointer;
  display: none;
  align-items: center; justify-content: center;
  flex-direction: column;
  gap: 4px;
  z-index: 200;
  animation: pulsate 0.9s ease-in-out infinite;
  box-shadow: 0 0 0 0 rgba(231,76,60,0.7);
  text-align: center;
  line-height: 1.2;
}
#touch-btn.show { display: flex; }
#touch-btn .touch-icon { font-size: 36px; line-height: 1; }

@keyframes pulsate {
  0%   { box-shadow: 0 0 0 0 rgba(231,76,60,0.7),   0 0 0 0 rgba(231,76,60,0.4); }
  50%  { box-shadow: 0 0 0 20px rgba(231,76,60,0),  0 0 0 40px rgba(231,76,60,0); }
  100% { box-shadow: 0 0 0 0 rgba(231,76,60,0.7),   0 0 0 0 rgba(231,76,60,0.4); }
}

/* Winner banner */
#winner-banner {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%,-50%) scale(0);
  background: linear-gradient(135deg, #1a3a1a, #0f0f1a);
  border: 2px solid var(--gold);
  border-radius: 24px;
  padding: 32px 48px;
  text-align: center;
  z-index: 300;
  transition: transform 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
  box-shadow: 0 0 60px rgba(241,196,15,0.3), var(--shadow);
  min-width: 280px;
}
#winner-banner.show { transform: translate(-50%,-50%) scale(1); }
#winner-banner h2 {
  font-family: var(--font-head);
  font-size: 22px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(241,196,15,0.5);
  margin-bottom: 8px;
}
#winner-banner p {
  font-family: var(--font-mono);
  font-size: 13px;
  color: rgba(255,255,255,0.5);
}

/* ─── Results Screen ─────────────────────────────────────────────────── */
#results-screen {
  flex-direction: column;
  gap: 0;
}
.results-box {
  background: var(--bg2);
  border: 1px solid rgba(241,196,15,0.25);
  border-radius: 24px;
  padding: 40px 48px;
  width: min(440px, 92vw);
  display: flex; flex-direction: column; align-items: center; gap: 24px;
  box-shadow: 0 0 80px rgba(241,196,15,0.1), var(--shadow);
}
.results-title {
  font-family: var(--font-head);
  font-size: 20px;
  color: var(--gold);
  text-shadow: 0 0 20px rgba(241,196,15,0.4);
  letter-spacing: 3px;
}
.results-list {
  width: 100%;
  display: flex; flex-direction: column; gap: 12px;
}
.result-row {
  display: flex; align-items: center; gap: 14px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 18px;
  animation: slideIn 0.4s cubic-bezier(0.175,0.885,0.32,1.275) both;
}
.result-row:nth-child(1) { animation-delay: 0.05s; border-color: rgba(241,196,15,0.3); }
.result-row:nth-child(2) { animation-delay: 0.15s; }
.result-row:nth-child(3) { animation-delay: 0.25s; }
.result-row:nth-child(4) { animation-delay: 0.35s; }
.result-rank {
  font-family: var(--font-head);
  font-size: 20px;
  color: var(--gold);
  width: 32px; text-align: center;
}
.result-rank.r2 { color: #bdc3c7; }
.result-rank.r3 { color: #cd7f32; }
.result-rank.r4 { color: rgba(255,255,255,0.25); }
.result-color-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.result-name { flex: 1; font-size: 16px; font-weight: 700; }
.result-points {
  font-family: var(--font-mono);
  font-size: 16px;
  color: var(--gold);
  font-weight: 700;
}
.results-countdown {
  font-family: var(--font-mono);
  font-size: 12px;
  color: rgba(255,255,255,0.3);
  letter-spacing: 3px;
}

/* ─── Abort Screen ───────────────────────────────────────────────────── */
#abort-screen {
  flex-direction: column;
}
.abort-box {
  background: var(--bg2);
  border: 1px solid rgba(231,76,60,0.3);
  border-radius: 24px;
  padding: 40px 48px;
  text-align: center;
  max-width: 360px;
  box-shadow: var(--shadow);
}
.abort-box h2 { font-family: var(--font-head); color: var(--red); font-size: 18px; margin-bottom: 10px; }
.abort-box p { font-family: var(--font-mono); font-size: 12px; color: rgba(255,255,255,0.4); margin-bottom: 20px; }
.abort-box button {
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 12px 28px;
  font-family: var(--font-head);
  font-size: 13px;
  cursor: pointer;
  transition: transform 0.2s cubic-bezier(0.175,0.885,0.32,1.275), opacity 0.2s;
}
.abort-box button:hover { transform: scale(1.05); opacity: 0.9; }

/* ─── Toast / Status ─────────────────────────────────────────────────── */
#status-toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%);
  background: rgba(0,0,0,0.75);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  padding: 8px 20px;
  font-family: var(--font-mono);
  font-size: 12px;
  color: rgba(255,255,255,0.6);
  letter-spacing: 2px;
  z-index: 500;
  pointer-events: none;
  backdrop-filter: blur(6px);
  transition: opacity 0.3s;
}

/* ─── Animations ─────────────────────────────────────────────────────── */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse-gold {
  0%,100% { box-shadow: 0 0 0 0 rgba(241,196,15,0.6); }
  50%      { box-shadow: 0 0 0 10px rgba(241,196,15,0); }
}
</style>
</head>
<body>

<!-- ────────────────────────────────────────────────────────────────────
     LOBBY SCREEN
───────────────────────────────────────────────────────────────────── -->
<div class="overlay" id="lobby-screen">
  <div class="lobby-box">
    <div class="lobby-title">
      Char Chitti Pro
      <span>MULTIPLAYER CARD GAME</span>
    </div>

    <div class="lobby-form">
      <div>
        <label>Your Name</label>
        <input type="text" id="name-input" maxlength="16" placeholder="Enter name…" autocomplete="off" />
      </div>
      <div>
        <label>Pick a Colour</label>
        <div class="color-row" id="color-row"></div>
      </div>
    </div>

    <div class="lobby-error" id="lobby-error"></div>
    <button class="lobby-btn" id="join-btn">JOIN GAME</button>
    <button class="lobby-btn" id="add-bots-btn" style="display: none; background: linear-gradient(135deg, #2ecc71, #27ae60); margin-top: 10px;">FILL WITH BOTS & START</button>

    <div class="lobby-players-waiting">
      <h4>Waiting for players</h4>
      <div class="waiting-list" id="waiting-list">
        <div style="color:rgba(255,255,255,0.2);font-size:12px;font-family:var(--font-mono);letter-spacing:2px;">No players yet…</div>
      </div>
    </div>
    <div class="lobby-count">Players: <span id="player-count">0</span> / 4</div>
  </div>
</div>

<!-- ────────────────────────────────────────────────────────────────────
     GAME SCREEN
───────────────────────────────────────────────────────────────────── -->
<div id="game-screen">
  <div class="game-table">

    <!-- Center hub -->
    <div class="center-hub">
      <div class="center-logo">♠ Char Chitti Pro ♠</div>
      <div class="turn-indicator">TURN: <span id="turn-name">—</span></div>
    </div>

    <!-- Player slots populated by JS -->
    <div class="player-slot" data-pos="top"    id="slot-top">
      <div class="name-tag" id="tag-top"><span class="pip"></span><span class="tag-name"></span><span class="hand-count"></span></div>
      <div class="hand-area" id="hand-top"></div>
    </div>

    <div class="player-slot" data-pos="left"   id="slot-left">
      <div class="hand-area" id="hand-left"></div>
      <div class="name-tag" id="tag-left"><span class="pip"></span><span class="tag-name"></span><span class="hand-count"></span></div>
    </div>

    <div class="player-slot" data-pos="right"  id="slot-right">
      <div class="hand-area" id="hand-right"></div>
      <div class="name-tag" id="tag-right"><span class="pip"></span><span class="tag-name"></span><span class="hand-count"></span></div>
    </div>

    <div class="player-slot" data-pos="bottom" id="slot-bottom">
      <div class="hand-area" id="hand-bottom"></div>
      <div class="name-tag" id="tag-bottom"><span class="pip"></span><span class="tag-name"></span><span class="hand-count"></span></div>
    </div>

  </div>

  <!-- Pass button (only shown when it's my turn & hand==5 or first move) -->
  <button class="pass-btn" id="pass-btn">PASS CARD ➤</button>

  <!-- Touch / Reaction button -->
  <button id="touch-btn">
    <span class="touch-icon">🖐️</span>
    <span>TOUCH!</span>
  </button>

  <!-- Winner flash banner -->
  <div id="winner-banner">
    <h2 id="winner-name-text">Player wins!</h2>
    <p id="winner-sub">Waiting for reactions…</p>
  </div>
</div>

<!-- ────────────────────────────────────────────────────────────────────
     RESULTS SCREEN
───────────────────────────────────────────────────────────────────── -->
<div class="overlay hidden" id="results-screen">
  <div class="results-box">
    <div class="results-title">⭐ Round Results</div>
    <div class="results-list" id="results-list"></div>
    <div class="results-countdown" id="results-countdown">RETURNING IN 8s</div>
  </div>
</div>

<!-- ────────────────────────────────────────────────────────────────────
     ABORT SCREEN
───────────────────────────────────────────────────────────────────── -->
<div class="overlay hidden" id="abort-screen">
  <div class="abort-box">
    <h2>Game Aborted</h2>
    <p id="abort-msg">A player disconnected.</p>
    <button onclick="location.reload()">Return to Lobby</button>
  </div>
</div>

<!-- Status toast -->
<div id="status-toast">Connecting…</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ── Config ─────────────────────────────────────────────────────────── */
const COLORS = [
  "#e74c3c","#e67e22","#f1c40f","#2ecc71",
  "#1abc9c","#3498db","#9b59b6","#e91e63"
];

/* ── State ──────────────────────────────────────────────────────────── */
let myIndex = -1;          // seat index 0-3
let myHand  = [];          // current cards in hand
let allPlayers = [];       // [{id,name,color,playerIndex}]
let currentTurnIndex = 0;
let starterIndex = 0;
let selectedCard = null;   // card value chosen to pass
let hasMadeFirstPass = false;
let inReactionPhase = false;
let myColor = COLORS[0];
let resultsCountdownInterval = null;

/* ── Socket ─────────────────────────────────────────────────────────── */
const socket = io();

/* ── DOM refs ───────────────────────────────────────────────────────── */
const lobbyScreen   = document.getElementById("lobby-screen");
const gameScreen    = document.getElementById("game-screen");
const resultsScreen = document.getElementById("results-screen");
const abortScreen   = document.getElementById("abort-screen");
const nameInput     = document.getElementById("name-input");
const joinBtn       = document.getElementById("join-btn");
const addBotsBtn    = document.getElementById("add-bots-btn");
const lobbyError    = document.getElementById("lobby-error");
const playerCount   = document.getElementById("player-count");
const waitingList   = document.getElementById("waiting-list");
const passBtn       = document.getElementById("pass-btn");
const touchBtn      = document.getElementById("touch-btn");
const winnerBanner  = document.getElementById("winner-banner");
const statusToast   = document.getElementById("status-toast");

/* ── Color Picker ───────────────────────────────────────────────────── */
const colorRow = document.getElementById("color-row");
COLORS.forEach((c, i) => {
  const dot = document.createElement("div");
  dot.className = "color-dot" + (i === 0 ? " selected" : "");
  dot.style.backgroundColor = c;
  dot.dataset.color = c;
  dot.addEventListener("click", () => {
    document.querySelectorAll(".color-dot").forEach(d => d.classList.remove("selected"));
    dot.classList.add("selected");
    myColor = c;
  });
  colorRow.appendChild(dot);
});

/* ── Helpers ─────────────────────────────────────────────────────────── */
function setToast(msg, duration = 3000) {
  statusToast.textContent = msg;
  statusToast.style.opacity = "1";
  clearTimeout(setToast._t);
  if (duration > 0) {
    setToast._t = setTimeout(() => { statusToast.style.opacity = "0"; }, duration);
  }
}

function positionForIndex(myIdx, theirIdx) {
  // Returns "bottom"/"top"/"left"/"right" for a given player relative to me
  const diff = (theirIdx - myIdx + 4) % 4;
  return ["bottom","left","top","right"][diff];
}

function clearHand(pos) {
  document.getElementById(`hand-${pos}`).innerHTML = "";
}

function renderFaceDownCards(pos, count) {
  const area = document.getElementById(`hand-${pos}`);
  area.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const card = document.createElement("div");
    card.className = "card face-down";
    area.appendChild(card);
  }
}

function renderMyCards() {
  const area = document.getElementById("hand-bottom");
  area.innerHTML = "";
  myHand.forEach((suit, idx) => {
    const card = document.createElement("div");
    card.className = "card";
    card.dataset.suit = suit;
    card.dataset.idx = idx;
    card.textContent = suit;

    const isMyTurn = currentTurnIndex === myIndex;
    const canPass  = isMyTurn && (
      (myIndex === starterIndex && !hasMadeFirstPass && myHand.length === 4) ||
      (myHand.length === 5)
    );

    if (canPass && !inReactionPhase) {
      card.classList.add("selectable");
      card.addEventListener("click", () => onCardClick(card, suit));
    }
    area.appendChild(card);
  });
}

function onCardClick(cardEl, suit) {
  // Deselect previous
  document.querySelectorAll(".card.selected-card").forEach(c => c.classList.remove("selected-card"));
  if (selectedCard === suit) {
    // toggle off
    selectedCard = null;
    passBtn.classList.remove("visible");
    return;
  }
  cardEl.classList.add("selected-card");
  selectedCard = suit;
  updatePassBtn();
}

function updatePassBtn() {
  if (inReactionPhase) { passBtn.classList.remove("visible"); return; }
  const isMyTurn = currentTurnIndex === myIndex;
  const canPass  = isMyTurn && (
    (myIndex === starterIndex && !hasMadeFirstPass && myHand.length === 4) ||
    (myHand.length === 5)
  );
  if (canPass && selectedCard !== null) {
    passBtn.classList.add("visible");
  } else {
    passBtn.classList.remove("visible");
  }
}

function updateTurnIndicator() {
  const p = allPlayers.find(p => p.playerIndex === currentTurnIndex);
  document.getElementById("turn-name").textContent = p ? p.name : "—";
  // Highlight name tags
  ["top","left","right","bottom"].forEach(pos => {
    const tag = document.getElementById(`tag-${pos}`);
    if (!tag) return;
    const idx = parseInt(tag.dataset.playerIndex ?? "-1");
    tag.classList.toggle("active-turn", idx === currentTurnIndex);
  });
}

function updateHandCount(pos, count) {
  const tag = document.getElementById(`tag-${pos}`);
  if (tag) tag.querySelector(".hand-count").textContent = ` (${count})`;
}

function buildNameTag(pos, player) {
  const tag = document.getElementById(`tag-${pos}`);
  tag.dataset.playerIndex = player.playerIndex;
  tag.style.borderColor = player.color + "66";
  const pip = tag.querySelector(".pip");
  pip.style.backgroundColor = player.color;
  tag.querySelector(".tag-name").textContent = player.name + (player.playerIndex === myIndex ? " (You)" : "");
  tag.querySelector(".hand-count").textContent = " (4)";
}

/* ── Socket Listeners ───────────────────────────────────────────────── */
socket.on("connect", () => setToast("Connected ✓", 2000));
socket.on("disconnect", () => setToast("Disconnected ✗", 0));

socket.on("lobbyState", ({ count, players: ps }) => {
  playerCount.textContent = count;
  rebuildWaitingList(ps);
});

socket.on("lobbyUpdate", ({ count, players: ps }) => {
  playerCount.textContent = count;
  rebuildWaitingList(ps);
  
  if (myIndex !== -1 && count > 0 && count < 4) {
    addBotsBtn.style.display = "block";
  } else {
    addBotsBtn.style.display = "none";
  }
});

function rebuildWaitingList(ps) {
  if (!ps || ps.length === 0) {
    waitingList.innerHTML = `<div style="color:rgba(255,255,255,0.2);font-size:12px;font-family:var(--font-mono);letter-spacing:2px;">No players yet…</div>`;
    return;
  }
  waitingList.innerHTML = ps.map(p => `
    <div class="waiting-player">
      <div class="waiting-dot" style="background:${p.color}"></div>
      <span>${p.name}</span>
    </div>
  `).join("");
}

socket.on("joinedLobby", ({ playerIndex }) => {
  myIndex = playerIndex;
  joinBtn.disabled = true;
  nameInput.disabled = true;
  setToast(`Joined as Player ${myIndex + 1}`, 3000);
});

socket.on("joinError", (msg) => {
  lobbyError.textContent = msg;
  joinBtn.disabled = false;
});

socket.on("gameStart", ({ players, hands, currentTurnIndex: cti, starterIndex: si }) => {
  allPlayers = players;
  currentTurnIndex = cti;
  starterIndex = si;
  hasMadeFirstPass = false;
  selectedCard = null;
  inReactionPhase = false;
  myHand = hands[socket.id] || [];

  // Hide lobby, show game
  lobbyScreen.classList.add("hidden");
  gameScreen.classList.add("active");

  // Build table
  buildTable();
  updateTurnIndicator();
  renderMyCards();

  // Hint for starter
  if (myIndex === starterIndex) {
    setToast("You go first! Select a card to pass.", 5000);
  } else {
    setToast("Game started! Waiting for Player 1…", 4000);
  }
});

function buildTable() {
  ["top","left","right"].forEach(pos => clearHand(pos));

  allPlayers.forEach(p => {
    if (p.playerIndex === myIndex) return; // skip self
    const pos = positionForIndex(myIndex, p.playerIndex);
    buildNameTag(pos, p);
    renderFaceDownCards(pos, 4);
  });
  buildNameTag("bottom", allPlayers.find(p => p.playerIndex === myIndex));
}

socket.on("handUpdate", ({ hand }) => {
  myHand = hand;
  selectedCard = null;
  renderMyCards();
  updatePassBtn();

  // Auto-check win
  if (hand.length === 4 && new Set(hand).size === 1 && !inReactionPhase) {
    triggerWin();
  }
});

socket.on("handSizes", (sizes) => {
  allPlayers.forEach(p => {
    if (p.playerIndex === myIndex) return;
    const pos = positionForIndex(myIndex, p.playerIndex);
    const count = sizes[p.id] ?? 0;
    renderFaceDownCards(pos, count);
    updateHandCount(pos, count);
  });
  updateHandCount("bottom", myHand.length);
});

socket.on("cardPassed", ({ fromIndex, toIndex, newCurrentTurnIndex, loopCompleted }) => {
  currentTurnIndex = newCurrentTurnIndex;

  // If I was the sender, mark first pass done
  if (fromIndex === myIndex) {
    hasMadeFirstPass = true;
  }

  // When a full loop is completed, reset the first pass flag so the starter can continue
  if (loopCompleted) {
    hasMadeFirstPass = false;
  }

  updateTurnIndicator();
  updatePassBtn();
  renderMyCards();

  const fromP = allPlayers.find(p => p.playerIndex === fromIndex);
  const toP   = allPlayers.find(p => p.playerIndex === toIndex);
  if (fromP && toP) {
    setToast(`${fromP.name} → ${toP.name}`, 1500);
  }
});

socket.on("reactionPhase", ({ winnerId, winnerName, winnerIndex }) => {
  inReactionPhase = true;
  passBtn.classList.remove("visible");
  selectedCard = null;

  // Show winner banner
  document.getElementById("winner-name-text").textContent = `🏆 ${winnerName} wins!`;
  document.getElementById("winner-sub").textContent = "React fast — touch now!";
  winnerBanner.classList.add("show");

  // If NOT the winner, show touch button
  if (socket.id !== winnerId) {
    touchBtn.classList.add("show");
  } else {
    // Winner sees alert
    setTimeout(() => alert(`🏆 You won this round!`), 100);
  }
});

socket.on("touchUpdate", ({ clickOrder }) => {
  const pos = clickOrder.indexOf(socket.id);
  if (pos >= 0) {
    setToast(`You're #${pos + 1} to react!`, 3000);
  }
});

socket.on("roundResults", ({ results }) => {
  // Hide game elements
  touchBtn.classList.remove("show");
  winnerBanner.classList.remove("show");

  const list = document.getElementById("results-list");
  list.innerHTML = results.map((r, i) => `
    <div class="result-row">
      <div class="result-rank r${r.rank}">${["🥇","🥈","🥉","💀"][i] || i+1}</div>
      <div class="result-color-dot" style="background:${r.color}"></div>
      <div class="result-name">${r.name}</div>
      <div class="result-points">${r.points}pt</div>
    </div>
  `).join("");

  resultsScreen.classList.remove("hidden");

  let cd = 8;
  const cdEl = document.getElementById("results-countdown");
  clearInterval(resultsCountdownInterval);
  resultsCountdownInterval = setInterval(() => {
    cd--;
    cdEl.textContent = `RETURNING IN ${cd}s`;
    if (cd <= 0) clearInterval(resultsCountdownInterval);
  }, 1000);
});

socket.on("returnToLobby", () => {
  // Reset everything
  gameScreen.classList.remove("active");
  resultsScreen.classList.add("hidden");
  lobbyScreen.classList.remove("hidden");

  joinBtn.disabled = false;
  nameInput.disabled = false;
  addBotsBtn.style.display = "none";
  myIndex = -1;
  myHand = [];
  allPlayers = [];
  selectedCard = null;
  hasMadeFirstPass = false;
  inReactionPhase = false;
  playerCount.textContent = "0";
  waitingList.innerHTML = `<div style="color:rgba(255,255,255,0.2);font-size:12px;font-family:var(--font-mono);letter-spacing:2px;">No players yet…</div>`;

  setToast("Lobby reset. Join again!", 4000);
});

socket.on("gameAborted", ({ reason }) => {
  gameScreen.classList.remove("active");
  resultsScreen.classList.add("hidden");
  document.getElementById("abort-msg").textContent = reason;
  abortScreen.classList.remove("hidden");
});

/* ── Win trigger ────────────────────────────────────────────────────── */
function triggerWin() {
  socket.emit("claim");
}

/* ── Pass Button ────────────────────────────────────────────────────── */
passBtn.addEventListener("click", () => {
  if (!selectedCard || inReactionPhase) return;

  const isMyTurn = currentTurnIndex === myIndex;
  const canPass  = isMyTurn && (
    (myIndex === starterIndex && !hasMadeFirstPass && myHand.length === 4) ||
    (myHand.length === 5)
  );
  if (!canPass) { setToast("Not your turn or wrong card count.", 2000); return; }

  socket.emit("passToNext", { card: selectedCard });
  selectedCard = null;
  passBtn.classList.remove("visible");
});

/* ── Touch Button ───────────────────────────────────────────────────── */
touchBtn.addEventListener("click", () => {
  socket.emit("touch");
  touchBtn.classList.remove("show");
  setToast("Touched! Waiting for others…", 3000);
});

/* ── Join Button ────────────────────────────────────────────────────── */
joinBtn.addEventListener("click", () => {
  const name = nameInput.value.trim();
  if (!name) { lobbyError.textContent = "Please enter a name."; return; }
  lobbyError.textContent = "";
  joinBtn.disabled = true;
  socket.emit("joinLobby", { name, color: myColor });
});
nameInput.addEventListener("keydown", (e) => { if (e.key === "Enter") joinBtn.click(); });

/* ── Add Bots Button ────────────────────────────────────────────────── */
addBotsBtn.addEventListener("click", () => {
  socket.emit("startWithBots");
  addBotsBtn.style.display = "none";
});

/* ── Init toast ────────────────────────────────────────────────────── */
setToast("Connecting to server…", 2000);
</script>
</body>
</html>
